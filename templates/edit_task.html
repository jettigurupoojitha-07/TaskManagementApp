<!DOCTYPE html>
<html>
<head>
    <title>Edit Task</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h2>Edit Task</h2>

<form method="POST">

    <input
    type="text"
    name="title"
    value="{{ task.title }}"
    required>

    <br><br>

    <input
    type="text"
    name="description"
    value="{{ task.description }}"
    required>

    <br><br>

    <select name="status">

        <option value="Pending"
        {% if task.status == 'Pending' %}selected{% endif %}>
        Pending
        </option>

        <option value="Completed"
        {% if task.status == 'Completed' %}selected{% endif %}>
        Completed
        </option>

    </select>

    <br><br>

    <select name="priority">

        <option value="Low"
        {% if task.priority == 'Low' %}selected{% endif %}>
        Low
        </option>

        <option value="Medium"
        {% if task.priority == 'Medium' %}selected{% endif %}>
        Medium
        </option>

        <option value="High"
        {% if task.priority == 'High' %}selected{% endif %}>
        High
        </option>

    </select>

    <br><br>

    <input
    type="date"
    name="due_date"
    value="{{ task.due_date }}">

    <br><br>

    <button type="submit">
        Update Task
    </button>

</form>

<br>

<a href="/dashboard">
    Back to Dashboard
</a>

</body>
</html>
