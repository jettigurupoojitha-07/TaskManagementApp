<!DOCTYPE html>
<html>
<head>
    <title>Add Task</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h2>Add New Task</h2>

<form method="POST">

    <input
    type="text"
    name="title"
    placeholder="Task Title"
    required>

    <br><br>

    <input
    type="text"
    name="description"
    placeholder="Task Description"
    required>

    <br><br>

    <select name="priority">
        <option>Low</option>
        <option>Medium</option>
        <option>High</option>
    </select>

    <br><br>

    <input
    type="date"
    name="due_date">

    <br><br>

    <button type="submit">
        Add Task
    </button>

</form>

<br>

<a href="/dashboard">
    Back to Dashboard
</a>

</body>
</html>
